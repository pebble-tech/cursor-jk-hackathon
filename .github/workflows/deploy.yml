name: Deploy (Production)

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        run: |
          curl -fsS -X POST "${{ secrets.VERCEL_PRD_DEPLOY_WEBHOOK_URL }}"
